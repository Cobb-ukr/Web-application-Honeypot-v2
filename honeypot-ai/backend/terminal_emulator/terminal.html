<!doctype html>
  <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
      <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
      <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        html, body {
          height: 100%;
          width: 100%;
          overflow: hidden;
        }
        body {
          background: #000000;
          font-family: 'Courier New', Courier, monospace;
        }
        #terminal {
          height: 100vh;
          width: 100vw;
          padding: 10px;
        }
      </style>
    </head>
    <body>
      <div id="terminal"></div>
      <script>
        var term = new Terminal({
            cursorBlink: true,
            fontFamily: 'courier-new, courier, monospace',
            fontSize: 14,
            lineHeight: 1.0,
            letterSpacing: 0,
            allowTransparency: false,
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff'
            }
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        term.open(document.getElementById('terminal'));
        
        // Fit terminal to container
        setTimeout(() => {
            fitAddon.fit();
        }, 100);
        
        // Handle window resize
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });
        
        term.write('Welcome to Ubuntu 22.04.2 LTS (GNU/Linux 5.15.0-76-generic x86_64)\r\n\r\n* Documentation:  https://help.ubuntu.com\r\n* Management:     https://landscape.canonical.com\r\n* Support:        https://ubuntu.com/advantage\r\n\r\nLast login: Tue Feb  8 10:30:00 2026 from 192.168.1.1\r\n');

        // Get session ID from URL parameters
        function getSessionId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('session_id');
        }

        const sessionId = getSessionId();
        if (!sessionId) {
            term.write('\r\n\r\nERROR: No session ID provided. Please access this terminal through the honeypot interface.\r\n');
        }

        // State management
        let systemState = {
            user: 'user',
            hostname: 'internal',
            current_dir: '/home/user',
            file_system: {
                '/home/user': ['passwords.txt', 'financial_report_2024.pdf', 'admin_backup.sql', 'private_key.pem'],
                '/': ['home', 'etc', 'var', 'usr'],
                '/etc': ['passwd', 'shadow', 'hosts'],
                '/var': ['log', 'www'],
                '/usr': ['bin', 'lib']
            }
        };
        let currentDir = systemState.current_dir;
        let fileSystem = systemState.file_system;
        let history = [];
        let historyIndex = -1;
        let command = '';
        const availableCommands = ['help', 'ls', 'cat', 'whoami', 'pwd', 'clear', 'exit', 'cd', 'mkdir', 'rm', 'echo', 'uname', 'ps', 'netstat'];

        function getPrompt() {
            const displayDir = currentDir === '/home/user' ? '~' : currentDir;
            return `\x1B[32m${systemState.user}\x1B[0m@\x1B[32m${systemState.hostname}\x1B[0m:\x1B[34m${displayDir}\x1B[0m$ `;
        }

        function getStateSnapshot() {
            return {
                user: systemState.user,
                hostname: systemState.hostname,
                current_dir: currentDir,
                file_system: fileSystem
            };
        }

        function applyState(state) {
            if (!state) return;
            systemState.user = state.user || systemState.user;
            systemState.hostname = state.hostname || systemState.hostname;
            currentDir = state.current_dir || currentDir;
            fileSystem = state.file_system || fileSystem;
        }

        function loadStateFromBackend() {
            if (!sessionId) {
                term.write(getPrompt());
                return;
            }
            fetch(`/portal/state?session_id=${sessionId}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.state) {
                        applyState(data.state);
                    }
                })
                .catch(() => {})
                .finally(() => {
                    term.write(getPrompt());
                });
        }

        function persistState() {
            if (!sessionId) return;
            fetch(`/portal/state_update?session_id=${sessionId}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ state: getStateSnapshot() })
            }).catch(() => {});
        }

        loadStateFromBackend();

        term.onData((data) => {
            if (data === '\r') {
                term.write('\r\n');
                if (command.trim()) {
                    history.push(command.trim());
                    historyIndex = history.length;
                }
                processCommand(command.trim());
                command = '';
            } else if (data === '\x7f') { // backspace
                if (command.length > 0) {
                    command = command.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (data === '\x1B[A') { // up arrow
                if (historyIndex > 0) {
                    historyIndex--;
                    command = history[historyIndex];
                    redrawCommandLine();
                }
            } else if (data === '\x1B[B') { // down arrow
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    command = history[historyIndex];
                    redrawCommandLine();
                } else if (historyIndex === history.length - 1) {
                    historyIndex++;
                    command = '';
                    redrawCommandLine();
                }
            } else if (data === '\t') { // tab
                handleTabCompletion();
            } else if (data === '\x03') { // Ctrl+C
                term.write('^C\r\n');
                command = '';
                term.write(getPrompt());
            } else if (data === '\x04') { // Ctrl+D
                term.write('logout\r\n');
                // Could add exit logic
            } else if (data.length === 1 && !data.match(/[\x00-\x1f]/)) { // printable
                command += data;
                term.write(data);
            }
        });

        function redrawCommandLine() {
            term.write('\r\x1B[K'); // clear line
            term.write(getPrompt() + command);
        }

        function handleTabCompletion() {
            const words = command.split(' ');
            const lastWord = words[words.length - 1];
            let matches = [];

            if (words.length === 1) {
                // command completion
                matches = availableCommands.filter(cmd => cmd.startsWith(lastWord));
            } else {
                // file completion
                const dirContents = fileSystem[currentDir] || [];
                matches = dirContents.filter(file => file.startsWith(lastWord));
            }

            if (matches.length === 1) {
                const completion = matches[0].slice(lastWord.length);
                command += completion;
                term.write(completion);
            } else if (matches.length > 1) {
                term.write('\r\n' + matches.join(' ') + '\r\n');
                term.write(getPrompt() + command);
            }
        }

        function processCommand(cmdLine) {
            if (!cmdLine) {
                term.write(getPrompt());
                return;
            }
            const args = cmdLine.split(' ');
            const cmd = args[0].toLowerCase();
            let output = "";

            if (cmd === "help") {
                output = "Available commands: " + availableCommands.join(', ');
            }
            else if (cmd === "ls") {
                output = (fileSystem[currentDir] || []).join('    ');
            }
            else if (cmd === "cat") {
                const filename = args[1];
                if (!filename) {
                    output = "Usage: cat [filename]";
                } else {
                    const contents = {
                        'passwords.txt': 'admin:SuperSecretPass123!\ndb_user:password123\nroot:toor',
                        'financial_report_2024.pdf': '[PDF content - sensitive financial data]',
                        'admin_backup.sql': '-- MySQL dump\nINSERT INTO users VALUES (1, "admin", "hashed_password");',
                        'private_key.pem': '-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC...\n-----END PRIVATE KEY-----'
                    };
                    output = contents[filename] || `cat: ${filename}: No such file or directory`;
                }
            }
            else if (cmd === "whoami") {
                output = systemState.user;
            }
            else if (cmd === "pwd") {
                output = currentDir;
            }
            else if (cmd === "clear") {
                term.clear();
                term.write('Welcome to Ubuntu 22.04.2 LTS (GNU/Linux 5.15.0-76-generic x86_64)\r\n\r\n* Documentation:  https://help.ubuntu.com\r\n* Management:     https://landscape.canonical.com\r\n* Support:        https://ubuntu.com/advantage\r\n\r\nLast login: Tue Feb  8 10:30:00 2026 from 192.168.1.1\r\n');
                term.write(getPrompt());
                return;
            }
            else if (cmd === "exit") {
                term.write('logout\r\n');
                // Send logout to backend
                if (sessionId) {
                    fetch('/portal/logout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId })
                    }).catch(err => console.error('Logout error:', err));
                }
                return;
            }
            else if (cmd === "cd") {
                const newDir = args[1] || '/home/user';
                if (fileSystem[newDir]) {
                    currentDir = newDir;
                    persistState();
                } else {
                    output = `bash: cd: ${newDir}: No such file or directory`;
                }
            }
            else if (cmd === "mkdir") {
                const dirname = args[1];
                if (!dirname) {
                    output = "Usage: mkdir [dirname]";
                } else {
                    const fullPath = currentDir + '/' + dirname;
                    if (!fileSystem[fullPath]) {
                        fileSystem[fullPath] = [];
                        fileSystem[currentDir].push(dirname);
                        persistState();
                    } else {
                        output = `mkdir: cannot create directory '${dirname}': File exists`;
                    }
                }
            }
            else if (cmd === "rm") {
                const filename = args[1];
                if (!filename) {
                    output = "Usage: rm [filename]";
                } else {
                    const index = fileSystem[currentDir].indexOf(filename);
                    if (index > -1) {
                        fileSystem[currentDir].splice(index, 1);
                        persistState();
                    } else {
                        output = `rm: cannot remove '${filename}': No such file or directory`;
                    }
                }
            }
            else if (cmd === "echo") {
                output = args.slice(1).join(' ');
            }
            else if (cmd === "uname") {
                if (args[1] === "-a") {
                    output = "Linux internal 5.15.0-76-generic #83-Ubuntu SMP Thu Jun 15 19:32:05 UTC 2023 x86_64 x86_64 x86_64 GNU/Linux";
                } else {
                    output = "Linux";
                }
            }
            else if (cmd === "ps") {
                output = "PID TTY          TIME CMD\n  1 ?        00:00:01 init\n  123 pts/0    00:00:00 sshd\n  456 pts/0    00:00:00 bash\n  789 pts/0    00:00:00 honeypot";
            }
            else if (cmd === "netstat") {
                output = "Active Internet connections (servers and established)\nProto Recv-Q Send-Q Local Address           Foreign Address         State\n...\n"; // Simplified
            }
            else {
                if (!sessionId) {
                    output = `bash: ${cmd}: command not found`;
                    term.write(output + '\r\n');
                    term.write(getPrompt());
                    return;
                }

                fetch(`/portal/llm_execute?session_id=${sessionId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        command: cmdLine,
                        state: getStateSnapshot()
                    })
                })
                .then(response => response.json())
                .then(data => {
                    const llmOutput = (data && typeof data.output === 'string') ? data.output : '';
                    if (llmOutput) {
                        term.write(llmOutput + '\r\n');
                    }
                    term.write(getPrompt());

                    if (sessionId) {
                        fetch(`/portal/execute?session_id=${sessionId}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                command: cmdLine,
                                output: llmOutput
                            })
                        }).catch(err => console.error('Failed to log command:', err));
                    }
                })
                .catch(() => {
                    const connectionError = 'Connection error: failed to reach response generator';
                    term.write(connectionError + '\r\n');
                    term.write(getPrompt());

                    if (sessionId) {
                        fetch(`/portal/execute?session_id=${sessionId}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                command: cmdLine,
                                output: connectionError
                            })
                        }).catch(err => console.error('Failed to log command:', err));
                    }
                });
                return;
            }

            if (output) {
                term.write(output + '\r\n');
            }
            term.write(getPrompt());

            // Send command and output to backend for logging
            if (sessionId) {
                fetch(`/portal/execute?session_id=${sessionId}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        command: cmdLine,
                        output: output
                    })
                }).catch(err => console.error('Failed to log command:', err));
            }
        }
      </script>
    </body>
  </html>
