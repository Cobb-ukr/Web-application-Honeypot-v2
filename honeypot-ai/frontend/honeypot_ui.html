<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Employee Portal</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css">
    <script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
    <script src="https://unpkg.com/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="/static/scripts.js?v=9" defer></script>
</head>

<body>
    <div class="container">
        <div class="honeypot-banner" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3>Welcome, User</h3>
                <p>Access Level: Standard Employee</p>
            </div>
            <button onclick="logoutHoneypot()"
                style="width: auto; background: var(--danger); padding: 10px 20px;">Logout</button>
        </div>

        <div class="dashboard-grid">
            <div class="glass-card stat-card">
                <div class="stat-label">Pending Reviews</div>
                <div class="stat-value">3</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Messages</div>
                <div class="stat-value">12</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Server Status</div>
                <div class="stat-value" style="color: var(--success)">OK</div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Internal Documents</h3>
            <p style="color: var(--text-muted); font-style: italic;">Directory Listing Disabled. Please use terminal
                access.</p>
            <!-- Files hidden for honeypot simulation -->
        </div>

        <div class="glass-card" style="margin-top: 2rem;">
            <h3>System Terminal</h3>
            <div id="terminal-container"
                style="background: black; border-radius: 8px; height: 400px; padding: 10px; overflow: hidden;"></div>
        </div>
    </div>

    <script>
        // Session tracking for honeypot - This will be replaced by the backend
        let HONEYPOT_SESSION_ID = 'SESSION_ID_PLACEHOLDER';

        // Log immediately to see if backend injection worked
        console.log('Script loaded. Initial HONEYPOT_SESSION_ID value:', HONEYPOT_SESSION_ID);

        // Initialize session on load - use injected value from backend
        function initHoneypotSession() {
            console.log('initHoneypotSession() called');
            console.log('HONEYPOT_SESSION_ID before processing:', HONEYPOT_SESSION_ID);
            console.log('Type of HONEYPOT_SESSION_ID:', typeof HONEYPOT_SESSION_ID);
            console.log('Length:', HONEYPOT_SESSION_ID.length);

            // Clear any old session storage from previous sessions
            sessionStorage.removeItem('honeypot_session_id');

            // Check if we have a valid UUID (36 chars with dashes) vs placeholder or client-generated ID
            const isValidUUID = HONEYPOT_SESSION_ID &&
                HONEYPOT_SESSION_ID.length === 36 &&
                HONEYPOT_SESSION_ID.includes('-') &&
                !HONEYPOT_SESSION_ID.startsWith('hs_');

            if (!isValidUUID) {
                HONEYPOT_SESSION_ID = 'hs_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                console.log('Generated new session ID (backend injection failed):', HONEYPOT_SESSION_ID);
            } else {
                console.log('✓ Using backend-injected UUID session ID:', HONEYPOT_SESSION_ID);
            }
            // Always store the current session ID
            sessionStorage.setItem('honeypot_session_id', HONEYPOT_SESSION_ID);
            console.log('Stored in sessionStorage:', sessionStorage.getItem('honeypot_session_id'));
        }

        function getSessionId() {
            // Always prioritize the current HONEYPOT_SESSION_ID variable
            // sessionStorage is only used as fallback if variable is lost
            const stored = sessionStorage.getItem('honeypot_session_id');
            const current = HONEYPOT_SESSION_ID !== 'SESSION_ID_PLACEHOLDER' ? HONEYPOT_SESSION_ID : null;

            // Use current if available, fallback to stored
            const sessionId = current || stored;
            return sessionId;
        }

        function logoutHoneypot() {
            const sessionId = getSessionId();
            console.log('logoutHoneypot() called');
            console.log('Sending logout request for session:', sessionId);
            console.log('Current HONEYPOT_SESSION_ID:', HONEYPOT_SESSION_ID);
            console.log('SessionStorage value:', sessionStorage.getItem('honeypot_session_id'));
            fetch(`/internal/logout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId })
            }).then(res => {
                console.log('Logout response received');
                sessionStorage.removeItem('honeypot_session_id');
                window.location.href = '/static/login.html';
            }).catch(err => {
                console.error('Logout error:', err);
            });
        }

        function sendLogoutBeacon() {
            const sessionId = getSessionId();
            if (!sessionId) return;
            const payload = JSON.stringify({ session_id: sessionId });
            try {
                navigator.sendBeacon('/internal/logout', new Blob([payload], { type: 'application/json' }));
            } catch (err) {
                // Best-effort only; ignore errors on unload
            }
        }

        // Override terminal execution to include session_id
        function setupHoneypotTerminal() {
            const terminalContainer = document.getElementById('terminal-container');

            if (!terminalContainer) return;

            const term = new Terminal({
                cursorBlink: true,
                theme: {
                    background: '#000000',
                    foreground: '#ffffff',
                    cursor: '#ffffff'
                },
                fontSize: 14,
                fontFamily: '"Courier New", Courier, monospace',
                lineHeight: 1.0,
                letterSpacing: 0,
                allowTransparency: false,
                convertEol: true,
                scrollback: 1000
            });

            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(terminalContainer);

            // Fit terminal to container with slight delay for proper rendering
            setTimeout(() => {
                fitAddon.fit();
            }, 100);

            // Re-fit on window resize
            window.addEventListener('resize', () => {
                fitAddon.fit();
            });
            term.write('Welcome to Ubuntu 22.04.2 LTS (GNU/Linux 5.15.0-76-generic x86_64)\r\n\r\n* Documentation:  https://help.ubuntu.com\r\n* Management:     https://landscape.canonical.com\r\n* Support:        https://ubuntu.com/advantage\r\n\r\nLast login: Tue Jan 19 14:23:11 2026 from 192.168.1.5\r\n');

            // State management
            let currentDir = '/home/user';
            let fileSystem = {
                '/home/user': ['passwords.txt', 'financial_report_2024.pdf', 'admin_backup.sql', 'private_key.pem'],
                '/': ['home', 'etc', 'var', 'usr'],
                '/etc': ['passwd', 'shadow', 'hosts'],
                '/var': ['log', 'www'],
                '/usr': ['bin', 'lib']
            };
            let history = [];
            let historyIndex = -1;
            let command = '';
            const availableCommands = ['help', 'ls', 'cat', 'whoami', 'pwd', 'clear', 'exit', 'cd', 'mkdir', 'rm', 'echo', 'uname', 'ps', 'netstat'];

            function getPrompt() {
                const displayDir = currentDir === '/home/user' ? '~' : currentDir;
                return `\x1B[32muser\x1B[0m@\x1B[32minternal\x1B[0m:\x1B[34m${displayDir}\x1B[0m$ `;
            }

            term.write(getPrompt());

            term.onData((data) => {
                if (data === '\r') {
                    term.write('\r\n');
                    if (command.trim()) {
                        history.push(command.trim());
                        historyIndex = history.length;
                    }
                    processCommand(command.trim());
                    command = '';
                } else if (data === '\x7f') { // backspace
                    if (command.length > 0) {
                        command = command.slice(0, -1);
                        term.write('\b \b');
                    }
                } else if (data === '\x1B[A') { // up arrow
                    if (historyIndex > 0) {
                        historyIndex--;
                        command = history[historyIndex];
                        redrawCommandLine();
                    }
                } else if (data === '\x1B[B') { // down arrow
                    if (historyIndex < history.length - 1) {
                        historyIndex++;
                        command = history[historyIndex];
                        redrawCommandLine();
                    } else if (historyIndex === history.length - 1) {
                        historyIndex++;
                        command = '';
                        redrawCommandLine();
                    }
                } else if (data === '\t') { // tab
                    handleTabCompletion();
                } else if (data === '\x03') { // Ctrl+C
                    term.write('^C\r\n');
                    command = '';
                    term.write(getPrompt());
                } else if (data === '\x04') { // Ctrl+D
                    term.write('logout\r\n');
                    logoutHoneypot();
                } else if (data.length === 1 && !data.match(/[\x00-\x1f]/)) { // printable
                    command += data;
                    term.write(data);
                }
            });

            function redrawCommandLine() {
                term.write('\r\x1B[K'); // clear line
                term.write(getPrompt() + command);
            }

            function handleTabCompletion() {
                const words = command.split(' ');
                const lastWord = words[words.length - 1];
                let matches = [];

                if (words.length === 1) {
                    // command completion
                    matches = availableCommands.filter(cmd => cmd.startsWith(lastWord));
                } else {
                    // file completion
                    const dirContents = fileSystem[currentDir] || [];
                    matches = dirContents.filter(file => file.startsWith(lastWord));
                }

                if (matches.length === 1) {
                    const completion = matches[0].slice(lastWord.length);
                    command += completion;
                    term.write(completion);
                } else if (matches.length > 1) {
                    term.write('\r\n' + matches.join(' ') + '\r\n');
                    term.write(getPrompt() + command);
                }
            }

            async function processCommand(cmdLine) {
                if (!cmdLine) {
                    term.write(getPrompt());
                    return;
                }
                const args = cmdLine.split(' ');
                const cmd = args[0].toLowerCase();
                let output = "";

                if (cmd === "help") {
                    output = "Available commands: " + availableCommands.join(', ');
                }
                else if (cmd === "ls") {
                    output = (fileSystem[currentDir] || []).join('\n');
                }
                else if (cmd === "cat") {
                    const filename = args[1];
                    if (!filename) {
                        output = "Usage: cat [filename]";
                    } else {
                        const contents = {
                            'passwords.txt': 'admin:SuperSecretPass123!\ndb_user:password123\nroot:toor',
                            'financial_report_2024.pdf': '[PDF content - sensitive financial data]',
                            'admin_backup.sql': '-- MySQL dump\nINSERT INTO users VALUES (1, "admin", "hashed_password");',
                            'private_key.pem': '-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC...\n-----END PRIVATE KEY-----'
                        };
                        output = contents[filename] || `cat: ${filename}: No such file or directory`;
                    }
                }
                else if (cmd === "whoami") {
                    output = "user";
                }
                else if (cmd === "pwd") {
                    output = currentDir;
                }
                else if (cmd === "clear") {
                    term.clear();
                    term.write('Welcome to Ubuntu 22.04.2 LTS (GNU/Linux 5.15.0-76-generic x86_64)\r\n\r\n* Documentation:  https://help.ubuntu.com\r\n* Management:     https://landscape.canonical.com\r\n* Support:        https://ubuntu.com/advantage\r\n\r\nLast login: Tue Jan 19 14:23:11 2026 from 192.168.1.5\r\n');
                    term.write(getPrompt());
                    return;
                }
                else if (cmd === "exit") {
                    term.write('logout\r\n');
                    logoutHoneypot();
                    return;
                }
                else if (cmd === "cd") {
                    const newDir = args[1] || '/home/user';
                    if (fileSystem[newDir]) {
                        currentDir = newDir;
                    } else {
                        output = `bash: cd: ${newDir}: No such file or directory`;
                    }
                }
                else if (cmd === "mkdir") {
                    const dirname = args[1];
                    if (!dirname) {
                        output = "Usage: mkdir [dirname]";
                    } else {
                        const fullPath = currentDir + '/' + dirname;
                        if (!fileSystem[fullPath]) {
                            fileSystem[fullPath] = [];
                            fileSystem[currentDir].push(dirname);
                        } else {
                            output = `mkdir: cannot create directory '${dirname}': File exists`;
                        }
                    }
                }
                else if (cmd === "rm") {
                    const filename = args[1];
                    if (!filename) {
                        output = "Usage: rm [filename]";
                    } else {
                        const index = fileSystem[currentDir].indexOf(filename);
                        if (index > -1) {
                            fileSystem[currentDir].splice(index, 1);
                        } else {
                            output = `rm: cannot remove '${filename}': No such file or directory`;
                        }
                    }
                }
                else if (cmd === "echo") {
                    output = args.slice(1).join(' ');
                }
                else if (cmd === "uname") {
                    if (args[1] === "-a") {
                        output = "Linux internal 5.15.0-76-generic #83-Ubuntu SMP Thu Jun 15 19:32:05 UTC 2023 x86_64 x86_64 x86_64 GNU/Linux";
                    } else {
                        output = "Linux";
                    }
                }
                else if (cmd === "ps") {
                    output = "PID TTY          TIME CMD\n  1 ?        00:00:01 init\n  123 pts/0    00:00:00 sshd\n  456 pts/0    00:00:00 bash\n  789 pts/0    00:00:00 honeypot";
                }
                else if (cmd === "netstat") {
                    output = "Active Internet connections (servers and established)\nProto Recv-Q Send-Q Local Address           Foreign Address         State\n...\n"; // Simplified
                }
                else {
                    output = `bash: ${cmd}: command not found`;
                }

                if (output) {
                    term.write(output + '\r\n');
                }
                term.write(getPrompt());

                // Send command and output to backend for logging
                const sessionId = getSessionId();
                if (sessionId) {
                    try {
                        await fetch(`/internal/execute?session_id=${sessionId}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                command: cmdLine,
                                output: output
                            })
                        });
                    } catch (err) {
                        console.error('Failed to log command:', err);
                    }
                }
            }

            window.addEventListener('resize', () => {
                fitAddon.fit();
            });
        }

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initHoneypotSession();
            setupHoneypotTerminal();
            maskHoneypotURL();
        });

        window.addEventListener('beforeunload', () => {
            sendLogoutBeacon();
        });

        // Mask the URL to make it look more legitimate
        function maskHoneypotURL() {
            try {
                // Change the URL in the browser to look like a legitimate internal portal
                const newURL = window.location.origin + '/internal/dashboard';
                window.history.replaceState(null, 'Internal Employee Portal', newURL);
                console.log('URL masked for deception');
            } catch (e) {
                console.log('URL masking failed:', e);
            }
        }
    </script>
