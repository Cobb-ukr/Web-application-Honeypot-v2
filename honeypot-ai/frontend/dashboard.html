<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Operations Center</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/scripts.js?v=9" defer></script>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>🛡️ Sentinel AI - Security Dashboard</h2>
            <div style="display: flex; gap: 10px;">
                <button onclick="clearLogs()" style="width: auto; background: #ff9500;">Clear Logs</button>
                <button onclick="logout()" style="width: auto; background: var(--danger);">Logout</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="glass-card stat-card">
                <div class="stat-label">Total Logins</div>
                <div class="stat-value" id="total-logins">0</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Total Attacks</div>
                <div class="stat-value threat-high" id="total-attacks">0</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-label">Active Threats</div>
                <div class="stat-value threat-medium" id="active-threats">0</div>
                <button onclick="openActiveThreats()" style="margin-top: 10px; padding: 6px 10px; font-size: 0.85rem; background: var(--primary); border: none; border-radius: 6px; color: white; cursor: pointer;">View Active Threats</button>
            </div>
        </div>

        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h3 style="margin: 0;">Live Attack Feed</h3>
                <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Time</span>
                        <select id="filter-time" style="padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.1);">
                            <option value="all">All</option>
                            <option value="hour">Last hour</option>
                            <option value="today">Today</option>
                            <option value="week">This week</option>
                        </select>
                    </label>
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Type</span>
                        <select id="filter-type" style="padding: 6px 10px; border-radius: 6px; background: rgba(255,255,255,0.06); color: white; border: 1px solid rgba(255,255,255,0.1);">
                            <option value="all">All</option>
                            <option value="successful">Successful Logins</option>
                            <option value="failed">Failed Logins</option>
                            <option value="malicious">Malicious Only</option>
                        </select>
                    </label>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>IP Address</th>
                            <th>Type</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Details</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="attack-log-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="active-threats-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 999;">
        <div class="glass-card" style="width: min(900px, 92vw); max-height: 80vh; overflow: auto; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin: 0;">Active Threats</h3>
                <button onclick="closeActiveThreats()" style="background: var(--danger); border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer;">Close</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>IP Address</th>
                            <th>Score</th>
                            <th>Risk</th>
                            <th>Last Updated</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="active-threats-body">
                        <tr><td colspan="5" style="color: var(--text-muted);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
